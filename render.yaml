services:
  - type: web
    name: lexrag-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.generation.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: lexrag-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
